server:
  port: 8080
  servlet:
    context-path: /lab-borrow
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/lab_borrow?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: Mbn20041208
    druid:
      initial-size: 2
      min-idle: 1
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp

mybatis:
  config-location: classpath:mybatis/mybatis-config.xml
  mapper-locations: classpath*:mybatis/mapper/*.xml

logging:
  level:
    com.lab.borrow: info
